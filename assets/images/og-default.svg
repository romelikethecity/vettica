    <circle cx="46" cy="46" r="5" fill="white"/>
    <line x1="18" y1="18" x2="32" y2="32" stroke="white" stroke-width="1.5" opacity="0.5"/>
    <line x1="46" y1="18" x2="32" y2="32" stroke="white" stroke-width="1.5" opacity="0.5"/>
