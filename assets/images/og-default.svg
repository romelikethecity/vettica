  <text x="82" y="412" font-family="Plus Jakarta Sans, Inter, system-ui, sans-serif" font-weight="400" font-size="22" fill="#CBD5E1">intelligence for animal health sales teams.</text>

  <!-- URL -->
  <text x="82" y="560" font-family="Plus Jakarta Sans, Inter, system-ui, sans-serif" font-weight="600" font-size="18" fill="#10B981">getvettica.com</text>

