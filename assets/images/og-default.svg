    <circle cx="46" cy="18" r="5" fill="white"/>
    <circle cx="18" cy="32" r="5" fill="white" opacity="0.35"/>
    <circle cx="32" cy="32" r="5" fill="white"/>
    <circle cx="46" cy="32" r="5" fill="white" opacity="0.35"/>
    <circle cx="18" cy="46" r="5" fill="white" opacity="0.35"/>
