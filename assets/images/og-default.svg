    <line x1="1010" y1="80" x2="980" y2="110" stroke="#10B981" stroke-width="1" opacity="0.5"/>
    <line x1="980" y1="110" x2="1010" y2="140" stroke="#10B981" stroke-width="1" opacity="0.5"/>
